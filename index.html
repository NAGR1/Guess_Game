<!doctype html>
<html>
<head>
    <title>Guess Game</title>
    <link rel="stylesheet" href="guesss-game.css">
</head>

<body>
    <div class="main-container">
        <h2>Guess Game</h2>

        <div style="margin-bottom:10px;">
            Guess a number between 1 - 20, you have 5 chances.
        </div>

        <div class="input">
            <input type="text" id="guess-value" name="guess-value">

            <button id="guess-btn">Guess!</button>

            <button id="restart-btn">Restart</button>
        </div>

        <hr>

        <div id="attempt-text" style="margin-bottom:10px;">
            Attempt <span id="attempt">0</span>/5
        </div>

        <div id="result"></div>
    </div>

    <script>
        let target = 0;
        let attempt = 0;

        const guessInput = document.getElementById("guess-value");
        const guessBtn = document.getElementById("guess-btn");
        const restartBtn = document.getElementById("restart-btn");
        const result = document.getElementById("result");
        const attemptDisplay = document.getElementById("attempt");

        function isNumeric(value) {
            return !isNaN(value) && value.trim() !== "";
        }

        guessInput.value = "";
        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
        attemptDisplay.textContent = "0";
        result.textContent = "";

        restartBtn.onclick = function () {

            target = Math.floor(Math.random() * 20) + 1;
            attempt = 0;

            attemptDisplay.textContent = "0";
            result.textContent = "";
            guessInput.value = "";

            restartBtn.style.display = "none";
            guessBtn.style.display = "inline-block";

            guessInput.focus();
        };

        guessBtn.onclick = function () {

            const value = guessInput.value;

            if (!isNumeric(value)) {
                return;
            }

            const guess = Number(value);

            attempt++;
            attemptDisplay.textContent = attempt;

            if (guess > target) {
                result.textContent = guess + " is too high";
            }
            else if (guess < target) {
                result.textContent = guess + " is too low";
            }
            else {
                result.textContent = "You WIN";
                guessBtn.style.display = "none";
                restartBtn.style.display = "inline-block";
            }

            if (attempt >= 5 && guess !== target) {
                result.textContent = "You LOSE";
                guessBtn.style.display = "none";
                restartBtn.style.display = "inline-block";
            }

            guessInput.value = "0";
            guessInput.focus();
        };
    </script>

</body>
</html>
